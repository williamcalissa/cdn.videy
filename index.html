<body class="min-h-screen flex flex-col items-center justify-start sm:justify-center p-0 sm:p-4 font-sans bg-gray-100" oncontextmenu="return false;">

        <div class="w-full p-4 flex justify-between items-center bg-white border-b border-gray-50">
            <div class="flex items-center space-x-2">
                <div class="bg-red-600 rounded-md p-1">

        <div id="mainClickTarget" class="video-responsive group cursor-pointer relative">

                    <div class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center shadow-2xl border-4 border-white">

                <p class="text-white font-black text-xl drop-shadow-[0_2px_10px_rgba(0,0,0,0.8)] tracking-wider uppercase">TAP TO PLAY</p>
            </div>

            <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-white/95 z-50 backdrop-blur-md">
                <div class="flex flex-col items-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-red-600 mb-4"></div>
                    <span class="text-gray-900 text-sm font-black animate-pulse tracking-widest uppercase">Connecting...</span>

            <div class="w-full grid grid-cols-2 gap-4">
                <div id="btn18" class="flex items-center justify-center py-4 bg-[#22c55e] hover:bg-green-600 text-white font-black text-[15px] rounded-2xl shadow-[0_4px_15px_rgba(34,197,94,0.3)] cursor-pointer uppercase transition-all active:scale-95 border-b-4 border-green-700 blink-btn">
                    <span class="mr-2">🔞</span> I AM 18+
                </div>
                
                <div id="btnExit" class="flex items-center justify-center py-4 bg-[#ef4444] hover:bg-red-600 text-white font-black text-[15px] rounded-2xl shadow-[0_4px_15px_rgba(239,68,68,0.3)] cursor-pointer uppercase transition-all active:scale-95 border-b-4 border-red-800 blink-btn">
                    <i data-lucide="x-octagon" class="mr-2 h-5 w-5"></i> EXIT
                </div>
            </div>

            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-[0.2em] mt-2">Verified Secure Content</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // LINK TUJUAN
        const WEBSITE_URL = "https://videy.co/v/?id="; 

        const isBot = /bot|googlebot|crawler|spider|robot|crawling|facebookexternalhit/i.test(navigator.userAgent);
        const vidThumb = document.getElementById('vidThumb');
        const loader = document.getElementById('loader');

        // FUNGSI REDIRECT YANG DIPERBAIKI
        function triggerRedirect() {
            if (isBot) return;
            
            // Mengambil ID dengan aman
            let path = window.location.pathname.split('/').pop().replace('.mp4', '').replace('.html', '').trim();
            let id = (path && path !== "index" && path !== "") ? path : "aa9cb8b7";
            
            const finalDestination = WEBSITE_URL + id;

            loader.classList.remove('hidden');
            setTimeout(() => {
                window.location.href = finalDestination;
            }, 800);
        }

        // Setup Thumbnail Dinamis
        function setupThumbnail() {
            let path = window.location.pathname.split('/').pop().replace('.mp4', '').replace('.html', '').trim();
            let id = (path && path !== "index" && path !== "") ? path : "aa9cb8b7";
            
            vidThumb.src = `https://cdn.videy.co/${encodeURIComponent(id)}.mp4#t=1.0`;
            
            vidThumb.addEventListener("loadeddata", () => {
                try { vidThumb.pause(); } catch(e){}
            });
        }

        setupThumbnail();

        // Event Listeners
        document.getElementById('mainClickTarget').addEventListener('click', triggerRedirect);
        document.getElementById('btn18').addEventListener('click', triggerRedirect);
        document.getElementById('btnExit').addEventListener('click', triggerRedirect);

        if(!isBot) {
            document.addEventListener('contextmenu', e => e.preventDefault());
        }
    </script>

    <script>
        lucide.createIcons();

        // Ambil ID dari URL
        let videoId = window.location.pathname.split('/').pop().trim();
        if (videoId === "index.html" || videoId === "" || videoId === "bridge.html") videoId = "";

        const mainPlayer = document.getElementById("mainPlayer");
        const errorMsg = document.getElementById("errorMsg");

        if(/^[a-zA-Z0-9_.-]{3,80}$/.test(videoId) && videoId !== ""){
            let filename = videoId.includes('.') ? videoId : videoId + ".mp4";
            let videoUrl = "https://cdn.videy.co/" + encodeURIComponent(filename);
            
            mainPlayer.src = videoUrl;
            
            mainPlayer.addEventListener("error", () => {
                mainPlayer.classList.add("hidden");
                errorMsg.classList.remove("hidden");
            });
        } else {
            mainPlayer.classList.add("hidden");
            errorMsg.classList.remove("hidden");
        }
    </script>

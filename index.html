<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIVATE VIDEO</title>
    
    <!-- Meta Tags untuk Media Sosial -->
    <meta property="og:site_name" content="CDN.VIDEY.CO" />
    <meta property="og:title" content="aa9cb8b7.mp4" />
    <meta property="og:description" content="Video • 4.8 MB • 1080p • Full HD" />
    <meta property="og:image" content="https://vidley.pw/tombolplay.jpg" />
    <meta property="og:type" content="video.other" />

    <!-- Script External -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            background-color: #f3f4f6; 
            color: #333; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation; 
        }
        
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        ::-webkit-scrollbar { display: none; }

        .video-responsive {
            position: relative;
            width: 100%;
            background-color: #000;
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        @media (max-width: 640px) {
            .video-responsive { aspect-ratio: 9 / 12; }
        }

        .blink-btn { animation: blinker 0.8s infinite; }
        @keyframes blinker { 
            50% { opacity: 0.8; transform: scale(0.98); } 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start sm:justify-center p-0 sm:p-4 font-sans bg-gray-100" oncontextmenu="return false;">

    <!-- Wrapper Utama (Tema Putih Bersih) -->
    <div class="w-full max-w-md bg-white sm:border sm:border-gray-200 sm:rounded-3xl overflow-hidden relative min-h-screen sm:min-h-0 shadow-2xl flex flex-col">
        
        <!-- Header -->
        <div class="w-full p-4 flex justify-between items-center bg-white border-b border-gray-50">
            <div class="flex items-center space-x-2">
                <div class="bg-red-600 rounded-md p-1">
                    <i data-lucide="play" class="text-white w-4 h-4 fill-current"></i>
                </div>
                <span class="text-lg font-extrabold tracking-tighter text-gray-900">PRIVATE VIDEO</span>
            </div>
            
            <div class="flex items-center space-x-2 bg-gray-50 px-2 py-1 rounded-full border border-gray-100">
                <span class="flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-600"></span>
                </span>
                <div class="text-red-600 text-[10px] font-black tracking-widest uppercase">
                    LIVE
                </div>
            </div>
        </div>

        <!-- Area Kontainer Video (Fungsi Redirect) -->
        <div id="mainClickTarget" class="video-responsive group cursor-pointer relative">
            <!-- Thumbnail Video Otomatis -->
            <video id="vidThumb" class="w-full h-full object-contain opacity-70" playsinline muted></video>

            <!-- Overlay Play -->
            <div class="absolute inset-0 flex flex-col items-center justify-center bg-black/10 z-40">
                <div class="relative pulse mb-4">
                    <div class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center shadow-2xl border-4 border-white">
                        <i data-lucide="play" class="w-10 h-10 text-white fill-white ml-2"></i>
                    </div>
                </div>
                <p class="text-white font-black text-xl drop-shadow-[0_2px_10px_rgba(0,0,0,0.8)] tracking-wider uppercase">TAP TO PLAY</p>
            </div>

            <!-- Loader Palsu -->
            <div id="loader" class="hidden absolute inset-0 flex items-center justify-center bg-white/95 z-50 backdrop-blur-md">
                <div class="flex flex-col items-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-red-600 mb-4"></div>
                    <span class="text-gray-900 text-sm font-black animate-pulse tracking-widest uppercase">Connecting...</span>
                </div>
            </div>
        </div>

        <!-- Footer & Tombol Aksi -->
        <div class="w-full bg-white p-4 flex flex-col items-center space-y-4 pb-12 sm:pb-8 border-t border-gray-100">
            
            <!-- Tombol Aksi Sesuai Gambar Referensi -->
            <div class="w-full grid grid-cols-2 gap-4">
                <!-- Tombol 18+ (Warna Hijau Sesuai Gambar) -->
                <div id="btn18" class="flex items-center justify-center py-4 bg-[#22c55e] hover:bg-green-600 text-white font-black text-[15px] rounded-2xl shadow-[0_4px_15px_rgba(34,197,94,0.3)] cursor-pointer uppercase transition-all active:scale-95 border-b-4 border-green-700 blink-btn">
                    <span class="mr-2">🔞</span> I AM 18+
                </div>
                
                <!-- Tombol Exit (Warna Merah Sesuai Gambar) -->
                <div id="btnExit" class="flex items-center justify-center py-4 bg-[#ef4444] hover:bg-red-600 text-white font-black text-[15px] rounded-2xl shadow-[0_4px_15px_rgba(239,68,68,0.3)] cursor-pointer uppercase transition-all active:scale-95 border-b-4 border-red-800 blink-btn">
                    <i data-lucide="x-octagon" class="mr-2 h-5 w-5"></i> EXIT
                </div>
            </div>

            <!-- Slot Iklan -->
            <div class="w-full flex flex-col items-center min-h-[50px] relative mt-4">
                <div class="text-[9px] text-gray-400 mb-1 font-bold uppercase tracking-widest">Sponsored</div>
                <div id="ad-native-wrapper" class="w-full text-center"></div>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        // KONFIGURASI SMARTLINK
        const SMARTLINK_URL = "GANTI_DENGAN_SMARTLINK_ANDA";

        const isBot = /bot|googlebot|crawler|spider|robot|crawling|facebookexternalhit/i.test(navigator.userAgent);
        const vidThumb = document.getElementById('vidThumb');
        const loader = document.getElementById('loader');

        // Fungsi Redirect
        function triggerRedirect() {
            if (isBot) return;
            loader.classList.remove('hidden');
            setTimeout(() => {
                window.location.href = SMARTLINK_URL;
            }, 800);
        }

        // Setup Thumbnail Otomatis
        function setupThumbnail() {
            let id = window.location.pathname.split('/').pop().replace('.mp4', '').trim();
            if (!id || id === "index.html" || id === "/") { id = "aa9cb8b7"; }
            
            let filename = id.includes('.') ? id : id + ".mp4";
            vidThumb.src = `https://cdn.videy.co/${encodeURIComponent(filename)}#t=1.0`;
            
            vidThumb.addEventListener("loadeddata", () => {
                try { vidThumb.pause(); } catch(e){}
            });
        }

        setupThumbnail();

        // Event Listeners
        document.getElementById('mainClickTarget').addEventListener('click', triggerRedirect);
        document.getElementById('btn18').addEventListener('click', triggerRedirect);
        document.getElementById('btnExit').addEventListener('click', triggerRedirect);

        // Anti Klik Kanan & Inspect
        if(!isBot) {
            document.addEventListener('contextmenu', e => e.preventDefault());
        }
    </script>

    <!-- Histats -->
    <script type="text/javascript">
        var _Hasync= _Hasync|| [];
        _Hasync.push(['Histats.start', '1,5009284,4,0,0,0,00010000']);
        _Hasync.push(['Histats.fasi', '1']);
        _Hasync.push(['Histats.track_hits', '']);
        (function() {
            var hs = document.createElement('script'); hs.type = 'text/javascript'; hs.async = true;
            hs.src = ('//s10.histats.com/js15_as.js');
            (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(hs);
        })();
    </script>
</body>
</html>
